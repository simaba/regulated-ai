name: Validate Release Configuration

on:
  push:
    paths:
      - 'release/release-checklist.yaml'
      - 'examples/sample-release-checklist.yaml'
      - '.github/workflows/validate-release-config.yml'
  pull_request:
    paths:
      - 'release/release-checklist.yaml'
      - 'examples/sample-release-checklist.yaml'
      - '.github/workflows/validate-release-config.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate release checklist YAML

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Validate release checklist structure
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path
          import yaml

          REQUIRED_TOP = ["metadata", "model_validation", "governance", "infrastructure"]
          REQUIRED_META = ["project", "version", "environment", "regulated_industry", "risk_classification"]
          ALLOWED_RISKS = {"low", "medium", "high"}

          paths = [
              Path("release/release-checklist.yaml"),
              Path("examples/sample-release-checklist.yaml"),
          ]

          failed = False
          for path in paths:
              if not path.exists():
                  print(f"ERROR: {path} is missing")
                  failed = True
                  continue

              config = yaml.safe_load(path.read_text(encoding="utf-8"))
              if not isinstance(config, dict):
                  print(f"ERROR: {path} must contain a YAML mapping at the top level")
                  failed = True
                  continue

              missing = [section for section in REQUIRED_TOP if section not in config]
              if missing:
                  print(f"ERROR: {path} missing required sections: {missing}")
                  failed = True
                  continue

              metadata = config.get("metadata", {})
              missing_meta = [field for field in REQUIRED_META if not metadata.get(field)]
              if missing_meta:
                  print(f"ERROR: {path} missing metadata fields: {missing_meta}")
                  failed = True

              risk = str(metadata.get("risk_classification", "")).lower()
              if risk and risk not in ALLOWED_RISKS:
                  print(f"ERROR: {path} has unsupported risk_classification: {risk}")
                  failed = True

              print(f"OK: {path}")
              print(f"  Project: {metadata.get('project', 'not set')}")
              print(f"  Environment: {metadata.get('environment', 'not set')}")
              print(f"  Risk Classification: {metadata.get('risk_classification', 'not set')}")

          if failed:
              sys.exit(1)
          PY
